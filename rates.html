<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vzzoxland | Отзывы</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ ЦВЕТОВ */
        :root {
            --bg-deep: #080808;
            --bg-surface: #121212;
            --bg-input: #1a1a1a;
            --border-muted: #222222;
            --text-main: #ffffff;
            --text-dim: #777777;
            --accent: #ffffff;
            --accent-soft: rgba(255, 255, 255, 0.1);
            --error: #ff5555;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ПРИЯТНЫЙ МИНИМАЛИСТИЧНЫЙ ФОН */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -10%, #1a1a1a 0%, #080808 70%);
            z-index: -1;
        }

        /* НАВИГАЦИЯ */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
        }

        /* ГАМБУРГЕР */
        .hamburger {
            width: 25px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 1002;
        }

        .hamburger span {
            display: block;
            width: 100%;
            height: 1px;
            background: var(--text-main);
            transition: var(--transition-smooth);
        }

        .hamburger.active span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

        /* МЕНЮ */
        .nav-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--bg-surface);
            border-left: 1px solid var(--border-muted);
            padding: 100px 50px;
            transition: var(--transition-smooth);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .nav-overlay.active { right: 0; }

        .nav-overlay a {
            font-size: 1.5rem;
            color: var(--text-main);
            text-decoration: none;
            opacity: 0.5;
            transition: var(--transition-fast);
        }

        .nav-overlay a:hover { opacity: 1; transform: translateX(10px); }

        /* КОНТЕЙНЕР */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-dim);
            margin-bottom: 50px;
        }

        /* ФОРМА ОТЗЫВА */
        .review-form {
            background: var(--bg-surface);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-muted);
            margin-bottom: 60px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .review-form h3 {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            background: var(--bg-input);
            border: 1px solid var(--border-muted);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-main);
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: var(--transition-fast);
        }

        textarea:focus {
            border-color: #444;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .char-count {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .submit-btn {
            background: var(--accent);
            color: var(--bg-deep);
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            background: #eee;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* СПИСОК ОТЗЫВОВ */
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .review-card {
            background: var(--bg-surface);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-muted);
            transition: var(--transition-fast);
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .review-card:hover {
            border-color: #333;
        }

        .review-user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .username {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .date {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .content {
            line-height: 1.7;
            color: var(--text-dim);
            font-size: 1rem;
        }

        /* TOAST NOTIFICATION */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-main);
            color: var(--bg-deep);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        footer {
            padding: 50px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-muted);
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <nav>
        <a href="Feed.html" class="logo">vzzoxland</a>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="nav-overlay" id="navOverlay">
        <a href="Feed.html">Главная</a>
        <a href="rates.html" style="opacity: 1;">Отзывы</a>
        <a href="buy.html">Услуги</a>
        <a href="admin.html" id="adminLink" style="display: none;">Админ Панель</a>
        <hr style="border: 0; border-top: 1px solid var(--border-muted); margin: 10px 0;">
        <a href="#" id="logoutBtn" style="color: var(--error); font-size: 1.1rem; opacity: 0.8;">Выйти</a>
    </div>

    <div class="main-content">
        <header>
            <h1>Отзывы</h1>
            <p>Мнение пользователей о нашей работе и сервисах.</p>
        </header>

        <section class="review-form">
            <h3>Оставить отзыв</h3>
            <form id="postReviewForm">
                <textarea id="reviewText" placeholder="Что вы думаете о vzzoxland?" maxlength="500"></textarea>
                <div class="form-footer">
                    <span class="char-count" id="charCount">0 / 500</span>
                    <button type="submit" class="submit-btn" id="submitBtn">Опубликовать</button>
                </div>
            </form>
        </section>

        <div class="reviews-list" id="reviewsContainer">
            <p style="text-align: center; color: var(--text-dim);">Загрузка отзывов...</p>
        </div>
    </div>

    <div id="toast"></div>

    <footer>
        vzzoxland &copy; 2026. <br>
        Честный фидбек — залог качества.
    </footer>

    <script>
        // ДАННЫЕ SUPABASE
        const SB_URL = "https://nmpbxqiknjhvyibhzmln.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tcGJ4cWlrbmpodnlpYmh6bWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTc4MDMsImV4cCI6MjA4OTg3MzgwM30.iH0H-tUnycPzJ93W2Cu_wdOB-Ga4OPEU4IU9BD5NglE";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // UI ЭЛЕМЕНТЫ
        const hamburger = document.getElementById('hamburger');
        const navOverlay = document.getElementById('navOverlay');
        const reviewsContainer = document.getElementById('reviewsContainer');
        const reviewForm = document.getElementById('postReviewForm');
        const reviewText = document.getElementById('reviewText');
        const charCount = document.getElementById('charCount');
        const submitBtn = document.getElementById('submitBtn');
        const adminLink = document.getElementById('adminLink');

        // ГАМБУРГЕР МЕНЮ
        hamburger.onclick = () => {
            hamburger.classList.toggle('active');
            navOverlay.classList.toggle('active');
        };

        // СЧЕТЧИК СИМВОЛОВ
        reviewText.oninput = () => {
            const length = reviewText.value.length;
            charCount.innerText = `${length} / 500`;
        };

        // УВЕДОМЛЕНИЯ
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // ПРОВЕРКА СЕССИИ И РОЛИ
        async function checkAccess() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
                return;
            }

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();

            if (profile && profile.role !== 'user') {
                adminLink.style.display = 'block';
            }
        }

        // ЗАГРУЗКА ОТЗЫВОВ
        async function fetchReviews() {
            const { data, error } = await supabaseClient
                .from('reviews')
                .select('*, profiles(username)')
                .order('created_at', { ascending: false });

            if (error) {
                reviewsContainer.innerHTML = "<p>Ошибка загрузки.</p>";
                return;
            }

            if (data.length === 0) {
                reviewsContainer.innerHTML = "<p style='text-align: center; color: #555;'>Отзывов пока нет. Станьте первым!</p>";
                return;
            }

            reviewsContainer.innerHTML = "";
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleDateString('ru-RU', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });
                const card = document.createElement('div');
                card.className = 'review-card';
                card.innerHTML = `
                    <div class="review-user-info">
                        <span class="username">@${item.profiles?.username || 'Пользователь'}</span>
                        <span class="date">${date}</span>
                    </div>
                    <div class="content">${item.content}</div>
                `;
                reviewsContainer.appendChild(card);
            });
        }

        // ОТПРАВКА ОТЗЫВА
        reviewForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = reviewText.value.trim();

            if (text.length < 5) {
                showToast("Отзыв слишком короткий");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Публикация...";

            const { data: { user } } = await supabaseClient.auth.getUser();

            const { error } = await supabaseClient
                .from('reviews')
                .insert({
                    user_id: user.id,
                    content: text
                });

            if (error) {
                showToast("Ошибка при отправке");
                console.error(error);
            } else {
                reviewText.value = "";
                charCount.innerText = "0 / 500";
                showToast("Отзыв опубликован!");
                fetchReviews(); // Обновляем список
            }

            submitBtn.disabled = false;
            submitBtn.innerText = "Опубликовать";
        };

        // ВЫХОД
        document.getElementById('logoutBtn').onclick = async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        };

        // ЗАПУСК
        checkAccess();
        fetchReviews();

    </script>
</body>
</html>
