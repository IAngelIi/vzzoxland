<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vzzoxland | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --card: #111111;
            --border: #1f1f1f;
            --accent: #ffffff;
            --text: #e0e0e0;
            --text-dim: #666666;
            --success: #00ff88;
            --error: #ff4444;
            --warning: #ffbb00;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR */
        aside {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .admin-logo {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 50px;
            padding-left: 15px;
        }

        .nav-link {
            padding: 14px 15px;
            border-radius: 8px;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--card);
            color: var(--accent);
        }

        .role-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 4px;
            background: var(--border);
            text-transform: uppercase;
            margin-top: auto;
            text-align: center;
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            margin-left: 280px;
            padding: 60px;
            max-width: 1200px;
        }

        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-card span { color: var(--text-dim); font-size: 0.9rem; }
        .stat-card h3 { font-size: 1.8rem; margin-top: 5px; }

        /* TABLES */
        .section-box {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: none;
        }

        .section-box.active { display: block; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 20px;
            background: #151515;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        td {
            padding: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }

        tr:hover { background: #151515; }

        /* BUTTONS */
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-approve { background: var(--success); color: #000; }
        .btn-reject { background: var(--error); color: #fff; }
        .btn-edit { background: var(--border); color: var(--text); }

        /* MODAL RESPONSES */
        .template-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .tpl-btn {
            background: #222;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .tpl-btn:hover { background: #333; color: #fff; }

        /* UTILS */
        .hidden { display: none; }
        .loader { text-align: center; padding: 40px; color: var(--text-dim); }

        @media (max-width: 1000px) {
            aside { width: 80px; padding: 40px 10px; }
            .nav-link span, .admin-logo, .role-badge { display: none; }
            main { margin-left: 80px; padding: 30px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="admin-logo">VZZOX LAND</div>
        <div class="nav-link active" onclick="showSection('orders', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span>Заказы</span>
        </div>
        <div class="nav-link" id="usersNavLink" onclick="showSection('users', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Пользователи</span>
        </div>
        <a href="Feed.html" class="nav-link" style="margin-top: 20px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>На сайт</span>
        </a>
        <div class="role-badge" id="myRole">loading...</div>
    </aside>

    <main>
        <header>
            <h1 id="pageTitle">Управление заказами</h1>
            <div id="adminName">Admin</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Ожидают проверки</span>
                <h3 id="countPending">-</h3>
            </div>
            <div class="stat-card">
                <span>Всего пользователей</span>
                <h3 id="countUsers">-</h3>
            </div>
            <div class="stat-card">
                <span>Обороты (Stars)</span>
                <h3 id="totalStars">-</h3>
            </div>
        </div>

        <div id="ordersSection" class="section-box active">
            <table>
                <thead>
                    <tr>
                        <th>Пользователь</th>
                        <th>Услуга</th>
                        <th>Цена</th>
                        <th>Статус</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    </tbody>
            </table>
            <div id="ordersLoader" class="loader">Синхронизация с базой...</div>
        </div>

        <div id="usersSection" class="section-box">
            <table>
                <thead>
                    <tr>
                        <th>Никнейм</th>
                        <th>Роль</th>
                        <th>Баланс</th>
                        <th>Дата</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const SB_URL = "https://nmpbxqiknjhvyibhzmln.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tcGJ4cWlrbmpodnlpYmh6bWxuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTc4MDMsImV4cCI6MjA4OTg3MzgwM30.iH0H-tUnycPzJ93W2Cu_wdOB-Ga4OPEU4IU9BD5NglE";
        const supabaseAdmin = supabase.createClient(SB_URL, SB_KEY);

        let currentAdmin = null;

        // Переключение вкладок
        function showSection(name, el) {
            document.querySelectorAll('.section-box').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(name + 'Section').classList.add('active');
            el.classList.add('active');
            document.getElementById('pageTitle').innerText = name === 'orders' ? 'Управление заказами' : 'База пользователей';
        }

        // Инициализация
        async function initAdmin() {
            const { data: { session } } = await supabaseAdmin.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }

            const { data: profile } = await supabaseAdmin
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();

            if (!profile || profile.role === 'user') {
                window.location.href = 'Feed.html';
                return;
            }

            currentAdmin = profile;
            document.getElementById('adminName').innerText = profile.username;
            document.getElementById('myRole').innerText = profile.role;

            // Ограничение прав: Только Director и Owner видят пользователей
            if (profile.role !== 'owner' && profile.role !== 'director') {
                document.getElementById('usersNavLink').style.display = 'none';
            }

            loadData();
        }

        async function loadData() {
            loadOrders();
            loadUsers();
            updateStats();
        }

        async function updateStats() {
            const { count: pending } = await supabaseAdmin.from('orders').select('*', { count: 'exact', head: true }).eq('status', 'pending');
            const { count: users } = await supabaseAdmin.from('profiles').select('*', { count: 'exact', head: true });
            
            document.getElementById('countPending').innerText = pending || 0;
            document.getElementById('countUsers').innerText = users || 0;
            document.getElementById('totalStars').innerText = '⚡';
        }

        async function loadOrders() {
            const { data, error } = await supabaseAdmin
                .from('orders')
                .select('*, profiles(username)')
                .order('created_at', { ascending: false });

            const tbody = document.getElementById('ordersTableBody');
            document.getElementById('ordersLoader').style.display = 'none';
            tbody.innerHTML = '';

            data.forEach(order => {
                const tr = document.createElement('tr');
                const statusColor = order.status === 'approved' ? 'var(--success)' : (order.status === 'rejected' ? 'var(--error)' : 'var(--warning)');
                
                tr.innerHTML = `
                    <td>@${order.profiles?.username}</td>
                    <td>${order.item_name}</td>
                    <td>${order.price}</td>
                    <td style="color: ${statusColor}">${order.status}</td>
                    <td>
                        ${order.status === 'pending' ? `
                            <button class="action-btn btn-approve" onclick="processOrder('${order.id}', 'approved')">V</button>
                            <button class="action-btn btn-reject" onclick="processOrder('${order.id}', 'rejected')">X</button>
                        ` : '<span style="opacity:0.3">Обработано</span>'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function processOrder(orderId, status) {
            const responseText = status === 'approved' ? "Ваш заказ принят! Ожидайте выполнения в течение 24 часов." : "Заказ отклонен. Недостаточно средств или некорректные данные.";
            
            const { error } = await supabaseAdmin
                .from('orders')
                .update({ 
                    status: status, 
                    reviewed_by: currentAdmin.id,
                    admin_response: responseText
                })
                .eq('id', orderId);

            if (!error) loadOrders();
        }

        async function loadUsers() {
            if (currentAdmin.role !== 'owner' && currentAdmin.role !== 'director') return;

            const { data } = await supabaseAdmin.from('profiles').select('*').order('role');
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            data.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${user.username}</td>
                    <td>${user.role}</td>
                    <td>${user.stars_balance}</td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="action-btn btn-edit" onclick="editUser('${user.id}', ${user.stars_balance})">+/-</button>
                        ${currentAdmin.role === 'owner' ? `<button class="action-btn btn-edit" style="margin-left:5px" onclick="changeRole('${user.id}')">Роль</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function editUser(userId, currentBalance) {
            const amount = prompt("Введите новое количество Stars:", currentBalance);
            if (amount !== null) {
                await supabaseAdmin.from('profiles').update({ stars_balance: parseInt(amount) }).eq('id', userId);
                loadUsers();
            }
        }

        async function changeRole(userId) {
            const newRole = prompt("Введите роль (user, support_agent, helper, director, owner):");
            if (newRole) {
                await supabaseAdmin.from('profiles').update({ role: newRole }).eq('id', userId);
                loadUsers();
            }
        }

        initAdmin();
    </script>
</body>
</html>
